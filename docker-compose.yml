version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: golden_carriere_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: golden_carriere_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: golden_carriere_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@golden-carriere.ma
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: golden_carriere_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+pg8000://postgres:password@postgres:5432/golden_carriere_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000
      DONUT_MODEL_PATH: /app/donut/model
    volumes:
      - ./data:/app/data
      - ./donut/model:/app/donut/model
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: golden_carriere_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
